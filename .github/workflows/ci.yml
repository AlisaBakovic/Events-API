name: CI

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest requests

      - name: Build Docker image
        run: docker build -t events-api .

      - name: Start container
        run: |
          docker run -d -p 5001:5001 --name events-api events-api
          sleep 10

      - name: Health check
        run: curl http://localhost:5001/api/health

      - name: Run tests
        run: pytest -v

      - name: Stop container
        if: always()
        run: docker stop events-api

      - name: Remove container
        if: always()
        run: docker rm events-api